<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Emirates TMS</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#DAA520;--gold2:#B8860B;--sid:#1a1a1a;--sid2:#222;--sidb:#2a2a2a;--sidt:#ccc;--sidt2:#777;--bg:#fff;--bg2:#f8f7f5;--bg3:#f0eee9;--bdr:#e0ddd5;--bdr2:#c8c4bb;--tx:#1a1a1a;--tx2:#555;--tx3:#999;--fn:'Barlow',sans-serif;--fnc:'Barlow Condensed',sans-serif}
body{font-family:var(--fn);background:var(--bg2);color:var(--tx);font-size:13px;min-height:100vh}
.app{display:flex;min-height:100vh}
.sb{width:200px;background:var(--sid);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--bg);border-bottom:1px solid var(--bdr);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px}
.pg{flex:1;overflow-y:auto;padding:14px}
.sb-logo{padding:14px;border-bottom:1px solid var(--sidb)}
.sb-logo img{width:36px;height:36px;object-fit:contain;border-radius:5px}
.sb-co{font-family:var(--fnc);font-size:10px;font-weight:700;color:#f5d06b;letter-spacing:1px;text-transform:uppercase;margin-top:6px;line-height:1.3}
.sb-sub{font-size:9px;color:var(--sidt2);letter-spacing:.5px;text-transform:uppercase}
.sb-nav{flex:1;padding:6px 0}
.sb-sec{padding:6px 12px 2px;font-size:9px;color:var(--sidt2);letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;color:var(--sidt);font-size:11px;border-left:3px solid transparent;transition:all .12s}
.sb-item:hover{background:var(--sid2);color:#fff}
.sb-item.on{background:rgba(218,165,32,.15);color:#f5d06b;border-left-color:var(--gold)}
.sb-item i{width:13px;text-align:center;font-size:12px}
.sb-foot{padding:10px 12px;border-top:1px solid var(--sidb);font-size:10px;color:var(--sidt2)}
.card{background:var(--bg);border:1px solid var(--bdr);border-radius:7px;padding:14px}
.csm{background:var(--bg2);border:1px solid var(--bdr);border-radius:5px;padding:9px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:600px){.g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}.sb{display:none}}
.sc{background:var(--bg);border:1px solid var(--bdr);border-radius:7px;padding:11px;display:flex;align-items:center;gap:9px}
.si{width:36px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:16px;flex-shrink:0;font-size:15px;justify-content:center}
.si-g{background:rgba(184,134,11,.12);color:var(--gold)}.si-b{background:rgba(37,99,235,.1);color:#2563eb}
.si-gr{background:rgba(22,163,74,.1);color:#16a34a}.si-r{background:rgba(220,38,38,.1);color:#dc2626}
.sl{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px}
.sv{font-family:var(--fnc);font-size:20px;font-weight:700;line-height:1}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:11px}
thead tr{background:var(--bg3)}
th{padding:7px 9px;text-align:left;font-family:var(--fnc);font-size:9px;font-weight:600;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--bdr);white-space:nowrap}
td{padding:7px 9px;border-bottom:1px solid var(--bdr);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.badge{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:500}
.bg{background:rgba(184,134,11,.12);color:#7a5800;border:1px solid rgba(184,134,11,.3)}
.bb{background:rgba(37,99,235,.1);color:#1d4ed8;border:1px solid rgba(37,99,235,.25)}
.bgr{background:rgba(22,163,74,.1);color:#15803d;border:1px solid rgba(22,163,74,.25)}
.br{background:rgba(220,38,38,.1);color:#b91c1c;border:1px solid rgba(220,38,38,.25)}
.bgy{background:var(--bg3);color:var(--tx2);border:1px solid var(--bdr)}
.bp{background:rgba(124,58,237,.1);color:#6d28d9;border:1px solid rgba(124,58,237,.25)}
.bcy{background:rgba(6,182,212,.1);color:#0e7490;border:1px solid rgba(6,182,212,.25)}
.bor{background:rgba(234,88,12,.1);color:#c2410c;border:1px solid rgba(234,88,12,.25)}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border-radius:5px;border:none;cursor:pointer;font-family:var(--fn);font-size:11px;font-weight:500;transition:all .12s;white-space:nowrap}
.b-gold{background:var(--gold);color:#fff;font-weight:600}.b-gold:hover{background:var(--gold2)}
.b-out{background:transparent;border:1px solid var(--bdr2);color:var(--tx2)}.b-out:hover{border-color:var(--gold);color:var(--gold)}
.b-gr{background:#16a34a;color:#fff}.b-bl{background:#2563eb;color:#fff}
.b-wa{background:#25d366;color:#fff}.b-rd{background:#dc2626;color:#fff}
.b-sm{padding:3px 8px;font-size:10px}
.bi{padding:3px;width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;border-radius:4px;border:1px solid var(--bdr);background:transparent;cursor:pointer;color:var(--tx2);transition:all .12s;font-size:10px}
.bi:hover{border-color:var(--gold);color:var(--gold)}.bi.d:hover{border-color:#dc2626;color:#dc2626}
.fg{margin-bottom:9px}
.fl{display:block;font-size:9px;color:var(--tx3);margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.fc{width:100%;background:var(--bg);border:1px solid var(--bdr2);border-radius:5px;padding:6px 9px;color:var(--tx);font-family:var(--fn);font-size:12px;outline:none;transition:border-color .12s}
.fc:focus{border-color:var(--gold)}.fc option{background:var(--bg)}
textarea.fc{resize:vertical;min-height:55px}
.sr{position:relative}.sr i{position:absolute;left:7px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:10px}
.sr input{padding-left:25px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:10px}
.modal{background:var(--bg);border:1px solid var(--bdr2);border-radius:9px;width:100%;max-width:500px;max-height:93vh;overflow-y:auto}
.mlg{max-width:660px}.mxl{max-width:800px}
.mh{padding:12px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:1}
.mt{font-family:var(--fnc);font-size:14px;font-weight:600}
.mb{padding:14px}
.mf{padding:9px 14px;border-top:1px solid var(--bdr);display:flex;justify-content:flex-end;gap:6px;background:var(--bg2)}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.stit{font-family:var(--fnc);font-size:13px;font-weight:600}
.flex{display:flex}.ic{align-items:center}.g6{gap:6px}.g8{gap:8px}
.mb10{margin-bottom:10px}.fw6{font-weight:600}.fn2{font-family:var(--fnc)}
.ts{font-size:11px}.tx2{font-size:10px}.tm{color:var(--tx2)}.td{color:var(--tx3)}.wf{width:100%}
.ini{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;background:rgba(184,134,11,.12);color:var(--gold)}
.ai{background:rgba(37,99,235,.08);border:1px solid rgba(37,99,235,.2);color:#1e40af;padding:7px 10px;border-radius:5px;font-size:10px;margin-bottom:8px}
.aw{background:rgba(234,88,12,.08);border:1px solid rgba(234,88,12,.2);color:#c2410c;padding:7px 10px;border-radius:5px;font-size:10px;margin-bottom:8px}
.aok{background:rgba(22,163,74,.08);border:1px solid rgba(22,163,74,.2);color:#15803d;padding:7px 10px;border-radius:5px;font-size:10px;margin-bottom:8px}
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#111,#222);padding:14px}
.lc{background:var(--bg);border-radius:10px;padding:24px;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.cd{width:7px;height:7px;border-radius:50%;flex-shrink:0;animation:pulse 2s infinite}
.cd.on{background:#22c55e}.cd.off{background:#f59e0b}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.qok{display:inline-flex;align-items:center;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600;background:rgba(22,163,74,.1);color:#15803d;border:1px solid rgba(22,163,74,.25)}
.qlow{display:inline-flex;align-items:center;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600;background:rgba(234,88,12,.1);color:#c2410c;border:1px solid rgba(234,88,12,.25)}
.qno{display:inline-flex;align-items:center;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600;background:rgba(220,38,38,.1);color:#b91c1c;border:1px solid rgba(220,38,38,.25)}
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:5px;padding:2px;margin-bottom:12px}
.tab{flex:1;padding:5px 7px;border-radius:3px;cursor:pointer;font-size:10px;font-weight:500;text-align:center;color:var(--tx2);transition:all .12s}
.tab.on{background:var(--bg);color:var(--tx);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.cbl{background:var(--bg3);border:1px solid var(--bdr2);border-radius:5px;max-height:180px;overflow-y:auto;padding:3px}
.cbi{display:flex;align-items:center;gap:6px;padding:4px 6px;cursor:pointer;border-radius:3px;transition:background .1s;font-size:11px}
.cbi:hover{background:rgba(0,0,0,.04)}
.cbi input{accent-color:var(--gold);width:12px;height:12px;cursor:pointer;flex-shrink:0}
</style>
</head>
<body>
<div id="root"></div>
<div id="notif" style="position:fixed;top:12px;right:12px;z-index:9999;padding:9px 13px;border-radius:7px;color:#fff;font-size:11px;display:none;max-width:280px;box-shadow:0 4px 12px rgba(0,0,0,.25)"></div>

<script>
// ── SUPABASE ──
let SURL=localStorage.getItem('ep_surl')||'';
let SKEY=localStorage.getItem('ep_skey')||'';
let CC=false;

async function sQ(path,method='GET',body=null){
  if(!SURL||!SKEY)throw new Error('Not configured');
  const h={'Content-Type':'application/json','apikey':SKEY,'Authorization':'Bearer '+SKEY};
  if(method==='POST')h['Prefer']='resolution=merge-duplicates,return=representation';
  const r=await fetch(SURL+path,{method,headers:h,body:body?JSON.stringify(body):null});
  if(!r.ok){const e=await r.text();throw new Error(e)}
  const t=await r.text();return t?JSON.parse(t):[];
}
function toSn(o){const r={};Object.keys(o).forEach(k=>{const nk=k.replace(/([A-Z])/g,'_$1').toLowerCase();let v=o[k];if(Array.isArray(v)||(typeof v==='object'&&v!==null))v=JSON.stringify(v);r[nk]=v});return r}
function toCm(o){const r={};Object.keys(o).forEach(k=>{const nk=k.replace(/_([a-z])/g,(_,c)=>c.toUpperCase());let v=o[k];if(typeof v==='string'&&(v.startsWith('[')||v.startsWith('{'))){try{v=JSON.parse(v)}catch(e){}}r[nk]=v});return r}
async function dbUp(tbl,rows){if(!CC||!rows||!rows.length)return;try{await sQ('/'+tbl+'?on_conflict=id','POST',rows.map(toSn))}catch(e){console.warn(tbl,e.message)}}
async function dbDel(tbl,id){if(!CC)return;try{await sQ('/'+tbl+'?id=eq.'+id,'DELETE')}catch(e){console.warn(e)}}
async function dbGet(tbl){try{const r=await sQ('/'+tbl+'?limit=2000&order=created_at.asc.nullslast');return r.map(toCm)}catch(e){console.warn(tbl,e.message);return null}}
async function testC(){try{await sQ('/tools?limit=1');CC=true;return true}catch(e){CC=false;return false}}
async function syncAll(){
  showN('Syncing to cloud...','info');
  try{for(const t of['tools','staff','supervisors','assignments','history','users','zones']){if((DB[t]||[]).length>0)await dbUp(t,DB[t])}localStorage.setItem('ep_ls',Date.now()+'');showN('✅ Synced!');render()}
  catch(e){showN('Sync error: '+e.message,'error')}
}
async function pullAll(){
  showN('Loading from cloud...','info');
  for(const t of['tools','staff','supervisors','assignments','history','users','zones']){const d=await dbGet(t);if(d!==null&&d.length>0)DB[t]=d}
  ensureAdmin();if(!DB.zones||!DB.zones.length)DB.zones=defZones();
  saveDB();showN('✅ Loaded!');render();
}

// ── CONSTANTS ──
const CONDITIONS=['Good','Fair','Damaged','Under Repair','Renew Required','Refurbished','Retired'];
const COND_BADGE={
  'Good':'bgr','Fair':'bg','Damaged':'br','Under Repair':'bor',
  'Renew Required':'br','Refurbished':'bcy','Retired':'bgy'
};
const TOOL_LIST=["GLASS CATCHER 3CUP","WOODEN HANDSAW","MARBLE CUTTER STANLEY","HAND PLANER","PIPE WRENCH 14\"","PIPE WRENCH 18\"","BOX SPANNER","HEATING GUN STANLEY","HILTY TIGHTER","LADDER 6STEP","PPR MACHINE","PAINTING STICK MEDIUM 3M","SCAFFOLDING (WHEEL 4PCS)","EXTENSION CABLE REEL-50M","AIR BLOWER STANLEY","VACUUM PUMP","HEATING GUN CHINA","NITROGEN CYLINDER 10L","NITROGEN GAUGE","LADDER 6STEP YELLOW","HOSE 50MTR","HOSE NOZZLE","HOSE CONNECTOR","HOSE CLIP","1HP VACUUM PUMP","DRILL MACHINE STANLEY","WELDING TORCH WITH HOSE","PRESSURE WASHER","7 STEP LADDER","8 STEP LADDER","MANHOLE KEY SET","AC SERVICE PUMP","HOSE ASSEMBLY PIPE FOR CLEANING","SPECIAL NOZZLE KRACHER","FLARING TOOL SET","JIGSAW MACHINE","Adjustable Spanner 8\"","Adjustable Spanner 12\"","Pipe Wrench","File","Clamp Meter","Hammer","Wire Stripper","410 Manifold Gauge Set","Nose Plier","Hack Saw Frame","Measurement Tape","Pipe Cutter Small","Pipe Cutter Big","Cutting Plier","Ratchet Spanner Set","Tester","Allen Key Set","Hacksaw Blade","Small Screw Driver Star","Brazing Gun Nozzle with Cable","Screw Driver Star Long","Nut Driver 8\"","Nut Driver 7\"","Nut Driver 1/4\"","Fins Straighter","Screw Driver Long Flat","Chisel","J-Tech Bag","Stanley Bag","Screw Driver Small Flat","18\" Stanley Trolley Bag","R22 Charging Long Line 150cm","R22 Manifold Gauge Full Set","12\" Long Flat Screw Driver UKEN","Thermometer Pen Type","6\" Star Screw Driver UKEN"];
const ALLP=['view_tech','manage_tech','view_tools','manage_tools','issue_tools','return_tools','view_history','export_data','view_sup','manage_zones'];
const PL={view_tech:'View Technicians',manage_tech:'Manage Technicians',view_tools:'View Tools',manage_tools:'Manage Tools',issue_tools:'Issue Tools',return_tools:'Return Tools',view_history:'View History',export_data:'Export Data',view_sup:'View Supervisors',manage_zones:'Manage Zones'};
const ROLES=['Admin','Supervisor','Storekeeper','Viewer'];
const RC={Admin:'bg',Supervisor:'bb',Storekeeper:'bp',Viewer:'bgy'};

// ── DB ──
let DB={tools:[],staff:[],supervisors:[],assignments:[],history:[],users:[],zones:[],backups:[]};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).substr(2,5);
const defZones=()=>['Zone 1','Zone 2','Zone 3','Zone 4','Zone 5'].map(n=>({id:uid(),name:n,createdAt:Date.now()}));
function saveDB(){try{localStorage.setItem('ep_tms_v8',JSON.stringify(DB))}catch(e){}}
function ensureAdmin(){
  if(!DB.users)DB.users=[];
  if(!DB.users.find(u=>u.username==='admin'))
    DB.users.unshift({id:'admin-root',username:'admin',password:'admin123',role:'Admin',name:'Administrator',permissions:ALLP,createdAt:Date.now()});
}
function loadDB(){
  try{
    const r=localStorage.getItem('ep_tms_v8')||localStorage.getItem('ep_tms_v7');
    if(r){DB=JSON.parse(r);}else{initDB();return}
    ensureAdmin();
    if(!DB.zones||!DB.zones.length)DB.zones=defZones();
    ['tools','staff','supervisors','assignments','history','backups'].forEach(k=>{if(!DB[k])DB[k]=[]});
  }catch(e){initDB()}
}
function initDB(){
  DB.zones=defZones();
  DB.tools=TOOL_LIST.map(n=>({id:uid(),name:n,condition:'Good',quantity:1,notes:'',createdAt:Date.now()}));
  DB.supervisors=[{id:uid(),name:'Ahmed Al Rashid',zone:'Zone 1',phone:'050-1234567',createdAt:Date.now()}];
  DB.staff=[{id:uid(),name:'Rajan Kumar',zone:'Zone 1',supervisorId:DB.supervisors[0].id,createdAt:Date.now()}];
  DB.users=[{id:'admin-root',username:'admin',password:'admin123',role:'Admin',name:'Administrator',permissions:ALLP,createdAt:Date.now()}];
  DB.assignments=[];DB.history=[];DB.backups=[];saveDB();
}

// ── STATE ──
let S={pg:'dashboard',modal:null,md:{},srch:{tools:'',staff:'',sups:'',is:'',it:''},tids:[],user:null,tab:'users'};

// ── HELPERS ──
const ini=n=>(n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().substr(0,2);
const fd=ts=>ts?new Date(ts).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'—';
const fdt=ts=>ts?fd(ts)+' '+new Date(ts).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}):'—';
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function zb(z){const cols=['bb','bgr','bg','bp','br','bgy'];const i=(DB.zones||[]).findIndex(x=>x.name===z);return`<span class="badge ${cols[Math.max(0,i)%cols.length]}">${z||'—'}</span>`}
function condBadge(c){return`<span class="badge ${COND_BADGE[c]||'bgy'}">${c||'Good'}</span>`}
const gT=id=>DB.tools.find(t=>t.id===id);
const gS=id=>DB.staff.find(s=>s.id===id);
const gSup=id=>DB.supervisors.find(s=>s.id===id);
const stTools=id=>DB.assignments.filter(a=>a.staffId===id&&a.status==='Issued');
const supStaff=id=>DB.staff.filter(s=>s.supervisorId===id);
const supTools=id=>{const ids=supStaff(id).map(s=>s.id);return DB.assignments.filter(a=>ids.includes(a.staffId)&&a.status==='Issued')};
const hp=p=>S.user?.role==='Admin'||(S.user?.permissions||[]).includes(p);
const zns=()=>(DB.zones||[]).map(z=>z.name);
const avQ=tid=>{const t=gT(tid);if(!t)return 0;return(t.quantity||1)-DB.assignments.filter(a=>a.toolId===tid&&a.status==='Issued').length};

function showN(msg,type='success'){const el=document.getElementById('notif');if(!el)return;el.textContent=msg;el.style.background={error:'#dc2626',info:'#2563eb',warn:'#d97706',success:'#16a34a'}[type]||'#16a34a';el.style.display='block';clearTimeout(window._nt);window._nt=setTimeout(()=>el.style.display='none',4000)}

// ── RENDER ──
function render(){
  const root=document.getElementById('root');
  if(!S.user){root.innerHTML=rLogin();return}
  root.innerHTML=`<div class="app">${rSB()}<div class="main">${rTop()}<div class="pg">${rPg()}</div></div></div>${S.modal?rModal():''}`;
  document.querySelectorAll('.sb-item[data-p]').forEach(el=>el.addEventListener('click',()=>{S.pg=el.dataset.p;S.modal=null;render()}));
}
function rp(){const el=document.querySelector('.pg');if(el)el.innerHTML=rPg()}

function rLogin(){
  return`<div class="lw"><div class="lc">
    <div style="text-align:center;margin-bottom:18px">
      <img src="/mnt/user-data/uploads/images.jpg" style="width:48px;height:48px;object-fit:contain;border-radius:7px" onerror="this.style.display='none'"/>
      <div style="font-family:var(--fnc);font-size:18px;font-weight:700;color:var(--gold);margin-top:7px;letter-spacing:1px">Emirates Properties</div>
      <div style="font-size:10px;color:var(--tx3)">Facility Management LLC — TMS</div>
    </div>
    ${CC?`<div class="aok" style="text-align:center;margin-bottom:10px"><i class="fas fa-cloud"></i> Cloud Connected</div>`:''}
    <div class="fg"><label class="fl">Username</label><input class="fc" id="lg-u" placeholder="Enter username" onkeydown="if(event.key==='Enter')login()"/></div>
    <div class="fg"><label class="fl">Password</label><input class="fc" id="lg-p" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()"/></div>
    <button class="btn b-gold wf" style="justify-content:center;padding:9px;margin-top:5px;font-size:13px" onclick="login()"><i class="fas fa-sign-in-alt"></i> Login</button>
  </div></div>`;
}

function rSB(){
  const isA=S.user?.role==='Admin';
  const nav=[
    {id:'dashboard',ic:'fa-gauge',lb:'Dashboard',al:1},
    {id:'tools',ic:'fa-toolbox',lb:'Tools',p:'view_tools'},
    {id:'tech',ic:'fa-users',lb:'Technicians',p:'view_tech'},

  return`<div class="tabs"><div class="tab${S.tab==='users'?' on':''}" onclick="S.tab='users';rp()">Users</div><div class="tab${S.tab==='backup'?' on':''}" onclick="S.tab='backup';rp()">Backup</div><div class="tab${S.tab==='cloud'?' on':''}" onclick="S.tab='cloud';rp()">Cloud</div></div>

// ── MODALS ──
function rModal(){
  switch(S.modal){
    case 'aTool':case 'eTool':return mTool(S.modal==='eTool'?S.md.id:null);
    case 'aqty':return mAqty(S.md.id);
    case 'aTech':case 'eTech':return mTech(S.modal==='eTech'?S.md.id:null);
    case 'aSup':case 'eSup':return mSup(S.modal==='eSup'?S.md.id:null);
    case 'aZone':case 'eZone':return mZone(S.modal==='eZone'?S.md.id:null);
    case 'issue':return mIssue();case 'ret':return mRet();
    case 'vTech':return mVTech();case 'vSup':return mVSup();
    case 'vTool':return mVTool();case 'print':return mPrint();
    case 'leaveRet':return mLeaveRet();
    case 'aUser':case 'eUser':return mUser(S.modal==='eUser'?S.md.id:null);
    default:return '';
  }
}
const mo=()=>`<div class="ov" onclick="if(event.target===this)closeM()">`;

  return`${mo()}<div class="modal"><div class="mh"><div class="mt"><i class="fas fa-toolbox" style="color:var(--gold)"></i> ${id?'Edit':'Add'} Tool</div><button class="bi" onclick="closeM()"><i class="fas fa-times"></i></button></div><div class="mb">
  <div class="fg"><label class="fl">Tool Name *</label><input class="fc" id="tn" value="${esc(t?t.name:'')}"/></div>
  <div class="g2" style="gap:8px">
    <div class="fg"><label class="fl">Quantity</label><input class="fc" id="tq" type="number" min="1" value="${t?t.quantity:1}"/></div>
    <div class="fg"><label class="fl">Condition</label>
      <select class="fc" id="tc">${CONDITIONS.map(c=>`<option value="${c}" ${t?.condition===c?'selected':''}>${c}</option>`).join('')}</select>
    </div>

  const t=gT(id);if(!t)return'';
  const iss=DB.assignments.filter(a=>a.toolId===id&&a.status==='Issued').length;
  return`${mo()}<div class="modal"><div class="mh"><div class="mt"><i class="fas fa-plus-circle" style="color:var(--gold)"></i> Add Stock — ${esc(t.name)}</div><button class="bi" onclick="closeM()"><i class="fas fa-times"></i></button></div><div class="mb">
  <div class="g2 mb10" style="gap:8px"><div class="csm" style="text-align:center"><div class="tx2 td">Current Total</div><div class="fn2 fw6" style="font-size:20px">${t.quantity||1}</div></div><div class="csm" style="text-align:center"><div class="tx2 td">Available</div><div class="fn2 fw6" style="font-size:20px;color:var(--gold)">${(t.quantity||1)-iss}</div></div></div>
  <div class="fg"><label class="fl">Add Quantity *</label><input class="fc" id="aq" type="number" min="1" value="1" oninput="var el=document.getElementById('aqnew');if(el)el.textContent=${t.quantity||1}+parseInt(this.value||0)"/></div>
  <div class="fg"><label class="fl">Remarks</label><input class="fc" id="aqr" placeholder="e.g. Purchased 3 new units"/></div>

  return`${mo()}<div class="modal mxl"><div class="mh"><div class="mt"><i class="fas fa-handshake" style="color:var(--gold)"></i> Issue Tool(s)</div><button class="bi" onclick="closeM()"><i class="fas fa-times"></i></button></div><div class="mb">

      <div class="cbl">${fT.map(t=>{const av=avQ(t.id);const dis=av<=0&&!S.tids.includes(t.id);return`<label class="cbi" style="${dis?'opacity:.45':''}"><input type="checkbox" ${S.tids.includes(t.id)?'checked':''} ${dis?'disabled':''} onchange="togT('${t.id}',this.checked)"/><span style="flex:1">${esc(t.name)}</span><span class="${av<=0?'qno':av<=2?'qlow':'qok'}" style="font-size:9px">${av<=0?'NONE':av}</span></label>`}).join('')}</div>

function mVTech(){
  const s=DB.staff.find(x=>x.id===S.md.id);if(!s)return'';
  const sup=gSup(s.supervisorId),tools=stTools(s.id).map(a=>({a,tool:gT(a.toolId)}));

  return`${mo()}<div class="modal mlg"><div class="mh"><div class="mt"><i class="fas fa-user" style="color:var(--gold)"></i> ${esc(s.name)}</div><div class="flex g6"><button class="btn b-sm b-out" onclick="printS('${s.id}')"><i class="fas fa-print"></i></button><button class="btn b-wa b-sm" onclick="shareWA('${s.id}')"><i class="fab fa-whatsapp"></i></button><button class="bi" onclick="closeM()"><i class="fas fa-times"></i></button></div></div><div class="mb">

function mVTool(){
  const t=gT(S.md.id);if(!t)return'';
  const iss=DB.assignments.filter(a=>a.toolId===t.id&&a.status==='Issued');
  const hist=DB.history.filter(h=>h.toolId===t.id).sort((a,b)=>b.timestamp-a.timestamp);
  const av=avQ(t.id);

async function connectC(){

  SURL=url;SKEY=key;localStorage.setItem('ep_surl',url);localStorage.setItem('ep_skey',key);

async function saveTool(id){
  const name=document.getElementById('tn')?.value?.trim();
  const qty=parseInt(document.getElementById('tq')?.value)||1;
  const cond=document.getElementById('tc')?.value||'Good';
  const notes=document.getElementById('tnotes')?.value||'';
  if(!name){showN('Enter tool name','error');return}
  if(id){const t=gT(id);if(t)Object.assign(t,{name,quantity:qty,condition:cond,notes});if(CC)await dbUp('tools',[gT(id)]);}
  else{const item={id:uid(),name,quantity:qty,condition:cond,notes,createdAt:Date.now()};DB.tools.push(item);if(CC)await dbUp('tools',[item]);}
  saveDB();closeM();S.pg='tools';render();showN('Tool saved!');
}

async function issueTls(){
  const sid=S.md.sid;const rem=document.getElementById('ir')?.value||'';
  if(!sid){showN('Select a technician','error');return}
  if(!S.tids.length){showN('Select tools','error');return}
  for(const tid of S.tids){if(avQ(tid)<=0){showN('"'+gT(tid)?.name+'" has 0 available!','error');return}}
  const now=Date.now(),by=S.user?.name||'';
  const nA=[],nH=[];
  S.tids.forEach(tid=>{
    const a={id:uid(),staffId:sid,toolId:tid,status:'Issued',issuedAt:now,remarks:rem,condition:'Good',issuedBy:by,createdAt:now};
    const h={id:uid(),staffId:sid,toolId:tid,action:'Issued',timestamp:now,remarks:rem,condition:'Good',issuedBy:by,createdAt:now};
    DB.assignments.push(a);DB.history.push(h);nA.push(a);nH.push(h);
  });
  if(CC){await dbUp('assignments',nA);await dbUp('history',nH);}
  S.tids=[];S.srch.is='';S.srch.it='';
  saveDB();closeM();S.pg='assign';render();showN('Tools issued!');
}

async function retTool(aId){
  const cond=document.getElementById('rc')?.value||'Good';
  const rem=document.getElementById('rr')?.value||'';
  const sig=document.getElementById('rs')?.value||'';
  const a=DB.assignments.find(x=>x.id===aId);if(!a)return;
  Object.assign(a,{status:'Returned',returnedAt:Date.now(),returnCondition:cond,signature:sig});
  const h={id:uid(),staffId:a.staffId,toolId:a.toolId,action:'Returned',timestamp:Date.now(),remarks:rem+(sig?` | Sig: ${sig}`:''),condition:cond,issuedBy:S.user?.name||'',createdAt:Date.now()};
  DB.history.push(h);const tool=gT(a.toolId);if(tool)tool.condition=cond;
  if(CC){await dbUp('assignments',[a]);await dbUp('history',[h]);}
  saveDB();closeM();render();showN('Tool returned!');
}

async function retAll(staffId){
  const active=DB.assignments.filter(a=>a.staffId===staffId&&a.status==='Issued');
  const s1=document.getElementById('ls1')?.value||'';
  const s2=document.getElementById('ls2')?.value||'';
  const now=Date.now();const nH=[];
  for(const a of active){
    Object.assign(a,{status:'Returned',returnedAt:now,returnCondition:'Good',signature:s1});
    const h={id:uid(),staffId,toolId:a.toolId,action:'Returned',timestamp:now,remarks:`Leave/Exit | Tech: ${s1} | Sup: ${s2}`,condition:'Good',issuedBy:S.user?.name||'',createdAt:now};
    DB.history.push(h);nH.push(h);
  }
  if(CC){await dbUp('assignments',active);await dbUp('history',nH);}
  saveDB();closeM();render();showN(`${active.length} tools returned!`);
}

  if(sec==='all'||sec==='tools')XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(DB.tools.map(t=>({Name:t.name,TotalQty:t.quantity||1,Available:avQ(t.id),Condition:t.condition||'Good',Notes:t.notes||''}))),'Tools');
  if(sec==='all'||sec==='staff')XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(DB.staff.map(s=>{const sup=gSup(s.supervisorId);return{Name:s.name,Zone:s.zone,Supervisor:sup?sup.name:'—',ToolsIssued:stTools(s.id).length}})),'Technicians');
  if(sec==='all'||sec==='supervisors')XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(DB.supervisors.map(s=>({Name:s.name,Zone:s.zone,Phone:s.phone,Technicians:supStaff(s.id).length,Tools:supTools(s.id).length}))),'Supervisors');
  if(sec==='all'||sec==='assignments')XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(DB.assignments.filter(a=>a.status==='Issued').map(a=>{const st=gS(a.staffId),tool=gT(a.toolId);return{Technician:st?st.name:'?',Zone:st?st.zone:'?',Tool:tool?tool.name:'?',IssuedDate:fd(a.issuedAt),IssuedBy:a.issuedBy||'',Remarks:a.remarks||''}})),'Assignments');
  if(sec==='all'||sec==='history')XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(DB.history.map(h=>{const st=gS(h.staffId),tool=gT(h.toolId);return{DateTime:fdt(h.timestamp),Technician:st?st.name:'?',Tool:tool?tool.name:'?',Action:h.action,IssuedBy:h.issuedBy||'',Condition:h.condition||'Good',Remarks:h.remarks||''}})),'History');
  XLSX.writeFile(wb,'Emirates_TMS_'+sec+'_'+new Date().toISOString().slice(0,10)+'.xlsx');showN('Exported!');
}

function openM(modal,id){S.modal=modal;S.md=id?{id}:{};if(modal==='issue'){S.tids=[];S.srch.is='';S.srch.it='';S.md.sid='';}render()}
function closeM(){S.modal=null;S.md={};render()}

async function init(){
  loadDB();
  if(SURL&&SKEY){const ok=await testC();if(ok){CC=true;await pullAll();return}}
  const last=localStorage.getItem('ep_lb');
  if(!last||Date.now()-parseInt(last)>86400000){doBackup();localStorage.setItem('ep_lb',Date.now()+'')}
  render();
}
init();
</script>
